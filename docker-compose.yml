version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: guangbo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: guangbo
      POSTGRES_PASSWORD: guangbo123
      POSTGRES_DB: guangbo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U guangbo"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: guangbo-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS 应用（可选，开发环境可以本地运行）
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: guangbo-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://guangbo:guangbo123@postgres:5432/guangbo
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=your-production-secret-key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data: